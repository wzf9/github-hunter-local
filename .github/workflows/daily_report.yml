name: Daily Report & Deploy to Pages

on:
  schedule:
    - cron: '0 1 * * *'        # 北京时间 9:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "GH_TOKEN=${{ secrets.GH_TOKEN }}" > .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}" >> .env
          echo "REPORT_WEBHOOK_URL=${{ secrets.REPORT_WEBHOOK_URL }}" >> .env
          echo "REPORT_WEBHOOK_STYLE=${{ secrets.REPORT_WEBHOOK_STYLE }}" >> .env

      - name: Run analysis and generate report
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}
          REPORT_WEBHOOK_STYLE: ${{ secrets.REPORT_WEBHOOK_STYLE }}
        run: |
          python main.py
          python analyze.py
          python daily_report.py

      - name: Generate index page (with CSV links)
        run: |
          echo "# 🏆 GitHub Hunter 每日报告" > reports/index.md
          echo "" >> reports/index.md
          echo "📅 生成时间（UTC）: $(date -u +'%Y-%m-%d %H:%M')" >> reports/index.md
          echo "" >> reports/index.md
          echo "| 日期 | Markdown 报告 | CSV 数据 |" >> reports/index.md
          echo "|------|--------------|----------|" >> reports/index.md

          # 收集所有日期
          for file in reports/daily_*.md reports/daily_*.csv; do
            [ -f "$file" ] || continue
            date_part=$(basename "$file" | sed 's/daily_//; s/\.md$//; s/\.csv$//')
            echo "$date_part" >> /tmp/dates.txt
          done
          sort -ur /tmp/dates.txt -o /tmp/dates.txt

          while read date; do
            md_file="daily_${date}.md"
            csv_file="daily_${date}.csv"
            md_link=""
            csv_link=""
            [ -f "reports/$md_file" ] && md_link="[📄 查看]($md_file)"
            [ -f "reports/$csv_file" ] && csv_link="[📥 下载]($csv_file)"
            echo "| $date | $md_link | $csv_link |" >> reports/index.md
          done < /tmp/dates.txt

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 更新每日报告 $(date +'%Y-%m-%d')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4