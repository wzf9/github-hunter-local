name: Daily Report & Deploy to Pages

on:
  schedule:
    - cron: '0 1 * * *'        # UTC 1:00，即北京时间 9:00
  workflow_dispatch:           # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "GH_TOKEN=${{ secrets.GH_TOKEN }}" > .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}" >> .env
          echo "REPORT_WEBHOOK_URL=${{ secrets.REPORT_WEBHOOK_URL }}" >> .env
          echo "REPORT_WEBHOOK_STYLE=${{ secrets.REPORT_WEBHOOK_STYLE }}" >> .env

      - name: Ensure reports directory exists
        run: mkdir -p reports

      - name: Run analysis scripts
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}
          REPORT_WEBHOOK_STYLE: ${{ secrets.REPORT_WEBHOOK_STYLE }}
        run: |
          python main.py
          python analyze.py
          python daily_report.py

      - name: Generate index.html
        run: |
          # 写入 HTML 头部，时间变量会展开
          cat > reports/index.html << EOF
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>GitHub Hunter 每日报告</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 0 auto; padding: 2em; background: #f9f9f9; color: #333; }
              h1 { color: #2c3e50; }
              table { width: 100%; border-collapse: collapse; margin-top: 1em; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
              th, td { padding: 0.8em; border-bottom: 1px solid #ddd; text-align: left; }
              th { background: #f0f0f0; }
              a { color: #007bff; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .footer { margin-top: 2em; font-size: 0.9em; color: #666; }
            </style>
          </head>
          <body>
            <h1>🏆 GitHub Hunter 每日报告</h1>
            <p>📅 生成时间（UTC）: $(date -u +'%Y-%m-%d %H:%M')</p>
            <table>
              <tr><th>日期</th><th>Markdown 报告</th><th>CSV 数据</th></tr>
          EOF

          # 收集所有日期并生成表格行
          for file in reports/daily_*.md reports/daily_*.csv; do
            [ -f "$file" ] || continue
            date_part=$(basename "$file" | sed 's/daily_//; s/\.md$//; s/\.csv$//')
            echo "$date_part" >> /tmp/dates.txt
          done
          sort -ur /tmp/dates.txt -o /tmp/dates.txt

          while read date; do
            md_file="daily_${date}.md"
            csv_file="daily_${date}.csv"
            md_link=""
            csv_link=""
            [ -f "reports/$md_file" ] && md_link="<a href='$md_file'>📄 查看</a>"
            [ -f "reports/$csv_file" ] && csv_link="<a href='$csv_file'>📥 下载</a>"
            echo "<tr><td>$date</td><td>$md_link</td><td>$csv_link</td></tr>" >> reports/index.html
          done < /tmp/dates.txt

          # 写入尾部
          cat >> reports/index.html << 'EOF'
          </table>
          <div class='footer'>自动生成于 GitHub Actions | 仓库: ${{ github.repository }}</div>
          </body></html>
          EOF

      - name: Add .nojekyll
        run: touch reports/.nojekyll

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 更新每日报告 $(date +'%Y-%m-%d')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4