name: Daily Report & Deploy to Pages

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ 将所有 Secret 写入 .env 文件
      - name: Create .env file
        run: |
          echo "GH_TOKEN=${{ secrets.GH_TOKEN }}" > .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}" >> .env
          echo "REPORT_WEBHOOK_URL=${{ secrets.REPORT_WEBHOOK_URL }}" >> .env
          echo "REPORT_WEBHOOK_STYLE=${{ secrets.REPORT_WEBHOOK_STYLE }}" >> .env

      # 运行脚本（环境变量也直接传入，防止脚本只读系统环境变量）
      - name: Run analysis and generate report
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}
          REPORT_WEBHOOK_STYLE: ${{ secrets.REPORT_WEBHOOK_STYLE }}
        run: |
          python main.py
          python analyze.py
          python daily_report.py

      # 后续的生成 index、提交、部署步骤不变...